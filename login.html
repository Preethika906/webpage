<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
body{
    font-family: Arial;
    background-color: #f2f2f2;
}

.login-box{
    width:300px;
    margin:100px auto;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    width:95%;
    padding:10px;
    background-color:blue;
    color:white;
    border:none;
    border-radius:5px;
}

</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form>
<input type="text" placeholder="Enter Username" required>
<br>

<input type="password" placeholder="Enter Password" required>
<br>

<button type="submit">Login</button>
</form>

</div>

</body>
</html>
